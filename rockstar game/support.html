<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rockstar Games Customer Support</title>
    <link rel="icon" type="image/png" sizes="32x32" href="https://media-rockstargames-com.akamaized.net/rockstargames-newsite/img/meta-icons/rockstar/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Chalet:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="support-theme">
    
    <header class="navbar">
        <div class="nav-container">
            <div class="nav-left" style="gap:40px;">
                <button class="menu-toggle"><i class="fas fa-bars"></i></button>
                <a href="index.html" class="logo" style="margin-right:0;">
                     <img src="logo.jpg.jpeg" alt="Rockstar Games" style="filter: invert(1);">
                </a>
                <h1 style="font-family: var(--font-heading); font-size: 24px; letter-spacing:1px; margin-top:5px; color: white;">SUPPORT</h1>
            </div>
            <div class="nav-right">
                <a href="signin.html" class="btn-solid-primary" style="padding: 10px 24px; text-decoration:none; background-color: white; color: black; border-radius: 4px; font-weight: 700; transition: background-color 0.2s;">Sign In</a>
            </div>
        </div>
    </header>

    <!-- Page Content offset -->
    <div style="margin-top: 80px;"></div>

    <!-- Support Hero Search -->
    <div class="support-hero" style="background-image: url('images/img1.jpg'); background-size: cover; background-position: center; position: relative; padding: 120px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1);">
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7);"></div>
        <div class="support-search" style="position: relative; z-index: 2; max-width: 800px; margin: 0 auto;">
            <h1 style="font-family: var(--font-heading); font-size: 48px; color: white; margin-bottom: 30px; text-shadow: 0 4px 10px rgba(0,0,0,0.5);">What do you need help with?</h1>
            <div style="position: relative;">
                <input type="text" placeholder="Tell us what you're having trouble with" style="width: 100%; padding: 20px 60px 20px 24px; font-size: 18px; border-radius: 8px; border: none; outline: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
                <i class="fas fa-search" style="position: absolute; right: 24px; top: 50%; transform: translateY(-50%); font-size: 20px; color: #666;"></i>
            </div>
        </div>
    </div>

    <!-- Support Section Grid -->
    <section style="padding: 80px 40px; max-width: 1400px; margin: 0 auto;">
        <h2 style="font-family: var(--font-heading); font-size: 32px; color: white; text-align: center; margin-bottom: 50px;">Select a Product</h2>
         <div class="grid store-grid" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px;">
            <a href="#" class="store-product" style="display: block; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 30px 20px; text-align:center; background: rgba(255,255,255,0.02); transition: all 0.3s ease; text-decoration: none;">
                <img src="https://media-rockstargames-com.akamaized.net/rockstargames-newsite/img/global/games/fob/640/V.jpg" alt="GTA V" style="width:100%; max-width: 180px; margin:0 auto 24px; display:block; border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.4);">
                <h3 style="font-size: 18px; font-weight: 700; color: white;">Grand Theft Auto V</h3>
            </a>
            <a href="#" class="store-product" style="display: block; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 30px 20px; text-align:center; background: rgba(255,255,255,0.02); transition: all 0.3s ease; text-decoration: none;">
                <img src="https://media-rockstargames-com.akamaized.net/rockstargames-newsite/img/global/games/fob/640/reddeadredemption2.jpg" alt="RDR2" style="width:100%; max-width: 180px; margin:0 auto 24px; display:block; border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.4);">
                <h3 style="font-size: 18px; font-weight: 700; color: white;">Red Dead Redemption 2</h3>
            </a>
             <a href="#" class="store-product" style="display: block; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 30px 20px; text-align:center; background: rgba(255,255,255,0.02); transition: all 0.3s ease; text-decoration: none;">
                <img src="images/img3.jpg" alt="GTA Online" style="width:100%; max-width: 180px; height:240px; object-fit:cover; margin:0 auto 24px; display:block; border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.4);">
                <h3 style="font-size: 18px; font-weight: 700; color: white;">GTA Online</h3>
            </a>
             <a href="#" class="store-product" style="display: block; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 30px 20px; text-align:center; background: rgba(255,255,255,0.02); transition: all 0.3s ease; text-decoration: none;">
                <img src="https://media-rockstargames-com.akamaized.net/rockstargames-newsite/img/global/games/fob/640/reddeadonline.jpg" alt="RDO" style="width:100%; max-width: 180px; margin:0 auto 24px; display:block; border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.4);">
                <h3 style="font-size: 18px; font-weight: 700; color: white;">Red Dead Online</h3>
            </a>
             <a href="#" class="store-product" style="display: flex; flex-direction:column; justify-content:center; align-items:center; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 30px 20px; text-align:center; background: rgba(255,255,255,0.02); transition: all 0.3s ease; text-decoration: none;">
                <div style="background:#000; width:100px; height:100px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:24px; border: 1px solid rgba(255,255,255,0.1);">
                    <img src="logo.jpg.jpeg" alt="Social Club" style="margin:0; width:50px; filter: invert(1);">
                </div>
                <h3 style="font-size: 18px; font-weight: 700; color: white;">Social Club</h3>
            </a>
            <a href="#" class="store-product" style="display: flex; flex-direction:column; justify-content:center; align-items:center; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 30px 20px; text-align:center; background: rgba(255,255,255,0.02); transition: all 0.3s ease; text-decoration: none;">
                <div style="background:#000; width:100px; height:100px; border-radius: 50%; display:flex; align-items:center; justify-content:center; margin-bottom:24px; border: 1px solid rgba(255,255,255,0.1);">
                    <i class="fas fa-desktop" style="font-size:40px; color:#fcaf17;"></i>
                </div>
                <h3 style="font-size: 18px; font-weight: 700; color: white;">Rockstar Games Launcher</h3>
            </a>
        </div>
    </section>

    <style>
        .store-product:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.05) !important;
            border-color: rgba(255,255,255,0.3) !important;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }
        .support-theme {
            background-color: #0b0b0b;
        }
    </style>

    <!-- Footer -->
    <footer class="footer" style="background:#000; padding: 60px 40px 40px; margin-top: 0; border-top: 1px solid rgba(255,255,255,0.1);">
        <div class="footer-top" style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 40px; margin-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.1);">
            <div class="footer-links" style="display: flex; gap: 32px;">
                <a href="#" style="color: white; font-weight: 700; font-size: 16px;">Support Home</a>
                <a href="#" style="color: white; font-weight: 700; font-size: 16px;">Contact Us</a>
            </div>
            <div class="footer-lang" style="display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 4px;">
                <i class="fas fa-globe" style="color: white; margin-right: 12px; font-size: 18px;"></i>
                <select style="background: transparent; color: white; border: none; font-size: 16px; font-weight: 600; cursor: pointer; outline: none; appearance: none; padding-right: 20px;">
                    <option value="en" selected>English</option>
                </select>
                <i class="fas fa-chevron-down" style="color: white; font-size: 12px; margin-left: -5px;"></i>
            </div>
        </div>
        <div class="footer-bottom">
            <div class="footer-locations" style="color:#666; font-size: 14px; font-weight: 600;">
                Rockstar Support
            </div>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
