<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Rockstar Games</title>
    <link rel="icon" type="image/png" sizes="32x32"
        href="https://media-rockstargames-com.akamaized.net/rockstargames-newsite/img/meta-icons/rockstar/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Chalet:wght@400;700&family=Inter:wght@400;600;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body.checkout-page {
            background-color: #0b0b0b;
            background-image: url('https://media-rockstargames-com.akamaized.net/rockstargames-newsite/img/global/games/fob/640/reddeadredemption2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-blend-mode: overlay;
        }

        body.checkout-page::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        .checkout-container {
            max-width: 800px;
            margin: 120px auto 60px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        .checkout-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .checkout-header h1 {
            font-family: var(--font-heading);
            font-size: 36px;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .checkout-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 600;
            color: #ccc;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            padding: 14px;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--btn-primary);
        }

        .payment-methods {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .payment-option {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            padding: 16px;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .payment-option.active {
            border-color: var(--btn-primary);
            background: rgba(252, 175, 23, 0.1);
            color: var(--btn-primary);
        }

        .payment-details {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border: 1px solid #222;
        }

        .payment-details.active {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .checkout-btn {
            background: var(--btn-primary);
            color: black;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .checkout-btn:hover {
            background: var(--btn-primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(252, 175, 23, 0.3);
        }

        .order-summary {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }

        .order-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .order-total {
            border-top: 1px solid #444;
            padding-top: 10px;
            margin-top: 10px;
            font-weight: 700;
            font-size: 20px;
            color: var(--btn-primary);
        }
    </style>
</head>

<body class="checkout-page">

    <header class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="logo">
                    <img src="https://media-rockstargames-com.akamaized.net/rockstargames-newsite/img/global/header/logo.svg"
                        alt="Rockstar Games">
                </a>
            </div>
            <div class="nav-right">
                <a href="downloads.html" style="color:white; font-weight:600; text-decoration:none;"><i
                        class="fas fa-arrow-left"></i> Back to Downloads</a>
            </div>
        </div>
    </header>

    <div class="checkout-container">
        <div class="checkout-header">
            <img src="https://media-rockstargames-com.akamaized.net/rockstargames-newsite/img/global/header/logo.svg"
                alt="R*" style="width: 50px; margin-bottom: 15px;">
            <h1>Secure Checkout</h1>
        </div>

        <div class="order-summary">
            <div class="order-row">
                <span>Selected Item</span>
                <span id="item-name">Digital Game Download</span>
            </div>
            <div class="order-row">
                <span>Platform</span>
                <span>PC</span>
            </div>
            <div class="order-row order-total">
                <span>Total Due</span>
                <span>$59.99</span>
            </div>
        </div>

        <form class="checkout-form"
            onsubmit="event.preventDefault(); alert('Order Placed Successfully!'); window.location.href='index.html';">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="john@example.com" required>
            </div>

            <div class="form-group">
                <label>Payment Method</label>
                <div class="payment-methods">
                    <div class="payment-option active" id="btn-cc" onclick="selectPayment('cc')">
                        <i class="fas fa-credit-card"></i> Credit Card
                    </div>
                    <div class="payment-option" id="btn-upi" onclick="selectPayment('upi')">
                        <i class="fas fa-mobile-alt"></i> UPI
                    </div>
                </div>
            </div>

            <div class="payment-details active" id="details-cc">
                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" placeholder="XXXX XXXX XXXX XXXX" maxlength="19">
                </div>
                <div style="display: flex; gap: 20px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Expiry Date</label>
                        <input type="text" placeholder="MM/YY" maxlength="5">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>CVV</label>
                        <input type="password" placeholder="XXX" maxlength="3">
                    </div>
                </div>
            </div>

            <div class="payment-details" id="details-upi">
                <div class="form-group">
                    <label>UPI ID</label>
                    <input type="text" placeholder="username@bank">
                </div>
                <p style="font-size: 12px; color: #aaa; margin-top: 5px;">You will receive a payment request on your UPI
                    app.</p>
            </div>

            <button type="submit" class="checkout-btn">Complete Purchase</button>
        </form>
    </div>

    <script>
        function selectPayment(method) {
            document.getElementById('btn-cc').classList.remove('active');
            document.getElementById('btn-upi').classList.remove('active');
            document.getElementById('details-cc').classList.remove('active');
            document.getElementById('details-upi').classList.remove('active');

            if (method === 'cc') {
                document.getElementById('btn-cc').classList.add('active');
                document.getElementById('details-cc').classList.add('active');
            } else {
                document.getElementById('btn-upi').classList.add('active');
                document.getElementById('details-upi').classList.add('active');
            }
        }
    </script>
</body>

</html>
