
<html>
<head>
  <title>DOM Manipulation Example</title>
</head>
<body>
  <h2 id="heading">Hello World</h2>
  <button onclick="changeText()">Click Me</button>

  <script>
    function changeText() {
      document.getElementById("heading").textContent = "Welcome to DOM Manipulation";
    }
  </script>
</body>
</html>
