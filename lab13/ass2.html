<html>
  <head>
    <title>Question2</title>
    <script>
      let a = parseInt(prompt("enter a num")); 
      let j = 1;

      for (let i = 1; i <= a; i++) {
        j = j * i;
      }
      console.log("Factorial:" + j );
    </script>
  </head>
  <body bgcolor="red" text="black"></body>
</html>
