<html>
  <head>
    <title>Question 7</title>
    <script>
      let count = new Array();
      let a = new Array(3,5,5,3,2,7,8,3,4,5,9,8,9)
      for (let i = 0; i < a.length; i++) {
        let c = 0;
        for (let j = 0; j < a.length; j++) {
          if (a[i] == a[j]) {
            c = c + 1;
          }
        }
        count.push(c);
      }
      console.log(a);
      console.log(count);
    </script>
  </head>
