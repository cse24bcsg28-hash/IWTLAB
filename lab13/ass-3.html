<html>
  <head>
    <title>Question3</title>
    <script>
      let a = parseInt(prompt("Enter a number: "));
      let k = a,
        z = 0;

      while (k != 0) {
        let rem = k % 10;
        k = Math.floor(k / 10);
        z = z * 10 + rem;
      }
      console.log("Reversed Number: " + z+"<br>");
      if (a == z) {
        console.log("Pallindrome");
      } else {
        console.log("Not Pallindrome");
      }
    </script>
  </head>
  <body></body>
</html>
